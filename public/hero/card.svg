<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 384 384" width="384" height="384">
    <defs>
        <!-- 背景淡色渐变 -->
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="100%" stop-color="#e2e8f0" />
        </linearGradient>

        <!-- 波浪科技感渐变 (青色) -->
        <linearGradient id="wave-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(0, 229, 255, 0)" />
            <stop offset="20%" stop-color="rgba(0, 229, 255, 0.6)" />
            <stop offset="80%" stop-color="rgba(0, 229, 255, 0.6)" />
            <stop offset="100%" stop-color="rgba(0, 229, 255, 0)" />
        </linearGradient>

        <!-- 波浪科技感渐变 (深蓝) -->
        <linearGradient id="wave-blue" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(41, 121, 255, 0)" />
            <stop offset="20%" stop-color="rgba(41, 121, 255, 0.5)" />
            <stop offset="80%" stop-color="rgba(41, 121, 255, 0.5)" />
            <stop offset="100%" stop-color="rgba(41, 121, 255, 0)" />
        </linearGradient>

        <!-- 波浪科技感渐变 (紫色) -->
        <linearGradient id="wave-purple" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="rgba(116, 77, 255, 0)" />
            <stop offset="20%" stop-color="rgba(116, 77, 255, 0.4)" />
            <stop offset="80%" stop-color="rgba(116, 77, 255, 0.4)" />
            <stop offset="100%" stop-color="rgba(116, 77, 255, 0)" />
        </linearGradient>

        <!-- 发光滤镜 -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- 强发光滤镜 -->
        <filter id="glow-strong" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <!-- 科技感方格网底纹 (等比缩小) -->
        <pattern id="tech-grid" width="16" height="16" patternUnits="userSpaceOnUse">
            <path d="M 16 0 L 0 0 0 16" fill="none" stroke="#cbd5e1" stroke-width="0.5" opacity="0.6"/>
            <!-- 交叉点的十字准星 -->
            <path d="M -1 0 L 1 0 M 0 -1 L 0 1" stroke="#94a3b8" stroke-width="0.5" />
        </pattern>

        <!-- 点状辅助网格 -->
        <pattern id="dot-grid" width="6" height="6" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="0.5" fill="#cbd5e1" opacity="0.4" />
        </pattern>

        <!-- 动态波浪路径 1 -->
        <path id="wave1">
            <animate attributeName="d"
                values="M -50 192 C 80 100, 160 284, 250 192 C 340 100, 420 284, 500 192;
                        M -50 192 C 80 284, 160 100, 250 192 C 340 284, 420 100, 500 192;
                        M -50 192 C 80 100, 160 284, 250 192 C 340 100, 420 284, 500 192"
                dur="20s" repeatCount="indefinite" />
        </path>
        <!-- 动态波浪路径 2 -->
        <path id="wave2">
            <animate attributeName="d"
                values="M -50 220 C 100 290, 150 150, 250 220 C 350 290, 400 150, 500 220;
                        M -50 220 C 100 150, 150 290, 250 220 C 350 150, 400 290, 500 220;
                        M -50 220 C 100 290, 150 150, 250 220 C 350 290, 400 150, 500 220"
                dur="25s" repeatCount="indefinite" />
        </path>
        <!-- 动态波浪路径 3 -->
        <path id="wave3">
            <animate attributeName="d"
                values="M -50 160 C 120 90, 180 230, 250 160 C 320 90, 380 230, 500 160;
                        M -50 160 C 120 230, 180 90, 250 160 C 320 230, 380 90, 500 160;
                        M -50 160 C 120 90, 180 230, 250 160 C 320 90, 380 230, 500 160"
                dur="22s" repeatCount="indefinite" />
        </path>
    </defs>

    <style>
        /* CSS 样式与动画适配 384px */
        .wave-base {
            fill: none;
            stroke-width: 1.5;
        }
        
        /* 模拟数据流的虚线及位移动画 */
        .data-stream {
            fill: none;
            stroke-width: 2;
            stroke-dasharray: 5 40;
            stroke-linecap: round;
            animation: flowRight 10s linear infinite;
        }
        .data-stream-fast {
            fill: none;
            stroke-width: 1.5;
            stroke-dasharray: 2 20;
            stroke-linecap: round;
            animation: flowRight 6s linear infinite;
        }
        .data-stream-reverse {
            fill: none;
            stroke-width: 2.5;
            stroke-dasharray: 8 80;
            stroke-linecap: round;
            animation: flowLeft 14s linear infinite;
        }

        @keyframes flowRight {
            0% { stroke-dashoffset: 200; }
            100% { stroke-dashoffset: 0; }
        }
        @keyframes flowLeft {
            0% { stroke-dashoffset: 0; }
            100% { stroke-dashoffset: 200; }
        }

        /* 悬浮元素的平滑动画 */
        .floating {
            animation: float 12s ease-in-out infinite;
        }
        .floating-delayed {
            animation: float 14s ease-in-out infinite 2s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(5px, -8px) rotate(5deg); }
            66% { transform: translate(-3px, 5px) rotate(-5deg); }
        }

        /* 呼吸发光点 */
        .pulse-node {
            transform-origin: center;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }

        /* 科技感装饰文字 (按比例缩小字体) */
        .tech-text {
            font-family: 'Courier New', Courier, monospace;
            font-size: 8px;
            fill: #64748b;
            letter-spacing: 1px;
            opacity: 0.8;
        }
    </style>

    <!-- 背景层级渲染 -->
    <rect width="100%" height="100%" fill="url(#bg-grad)" />
    <rect width="100%" height="100%" fill="url(#dot-grid)" />
    <rect width="100%" height="100%" fill="url(#tech-grid)" />

    <!-- 核心波浪效果 -->
    <g filter="url(#glow)">
        <use href="#wave3" class="wave-base" stroke="url(#wave-purple)" />
        <use href="#wave3" class="data-stream-reverse" stroke="#a855f7" />
    </g>

    <g filter="url(#glow-strong)">
        <use href="#wave2" class="wave-base" stroke="url(#wave-blue)" />
        <use href="#wave2" class="data-stream-fast" stroke="#3b82f6" />
    </g>

    <g filter="url(#glow)">
        <use href="#wave1" class="wave-base" stroke="url(#wave-cyan)" />
        <use href="#wave1" class="data-stream" stroke="#06b6d4" />
    </g>

    <!-- 科技装饰细节 & HUD标注 -->
    <g class="floating">
        <!-- 右上角六边形簇 -->
        <g transform="translate(300, 80)" opacity="0.6">
            <path d="M 0 -15 L 13 -7.5 L 13 7.5 L 0 15 L -13 7.5 L -13 -7.5 Z" fill="none" stroke="#3b82f6" stroke-width="1" />
            <path d="M 0 -10 L 8.66 -5 L 8.66 5 L 0 10 L -8.66 5 L -8.66 -5 Z" fill="rgba(59, 130, 246, 0.1)" stroke="#06b6d4" stroke-width="0.5" />
            <circle cx="0" cy="0" r="1.5" fill="#06b6d4" class="pulse-node" />
            <line x1="15" y1="0" x2="35" y2="0" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="2 2" />
            <text x="40" y="3" class="tech-text">SYS_NODE_A</text>
        </g>
    </g>

    <g class="floating-delayed">
        <!-- 左下角六边形簇 -->
        <g transform="translate(80, 280)" opacity="0.5">
            <path d="M 0 -12 L 10.4 -6 L 10.4 6 L 0 12 L -10.4 6 L -10.4 -6 Z" fill="none" stroke="#a855f7" stroke-width="1" />
            <circle cx="0" cy="0" r="1.5" fill="#a855f7" class="pulse-node" style="animation-delay: 1s;" />
            <line x1="12" y1="-6" x2="30" y2="-15" stroke="#94a3b8" stroke-width="0.8" stroke-dasharray="1 2" />
            <text x="34" y="-16" class="tech-text">LINK: OK</text>
        </g>
    </g>

    <!-- 边缘界面装饰线 -->
    <path d="M 30 30 L 45 30 L 55 40" fill="none" stroke="#64748b" stroke-width="1" />
    <circle cx="30" cy="30" r="1.5" fill="#64748b" />
    <text x="60" y="42" class="tech-text">INIT_01</text>

    <path d="M 354 354 L 339 354 L 329 344" fill="none" stroke="#64748b" stroke-width="1" />
    <circle cx="354" cy="354" r="1.5" fill="#64748b" />
    <text x="274" y="342" class="tech-text">STREAM_STABLE</text>

    <!-- 四角锁定标记 -->
    <g opacity="0.4">
        <path d="M 15 25 L 15 15 L 25 15" fill="none" stroke="#64748b" stroke-width="1.5" />
        <path d="M 369 25 L 369 15 L 359 15" fill="none" stroke="#64748b" stroke-width="1.5" />
        <path d="M 15 359 L 15 369 L 25 369" fill="none" stroke="#64748b" stroke-width="1.5" />
        <path d="M 369 359 L 369 369 L 359 369" fill="none" stroke="#64748b" stroke-width="1.5" />
    </g>

    <!-- 顺着波浪轨迹移动的发光粒子 -->
    <circle r="2" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="10s" repeatCount="indefinite">
            <mpath href="#wave1" />
        </animateMotion>
    </circle>
    
    <circle r="1.5" fill="#06b6d4" filter="url(#glow)">
        <animateMotion dur="8s" repeatCount="indefinite" begin="3s">
            <mpath href="#wave1" />
        </animateMotion>
    </circle>

    <circle r="2" fill="#ffffff" filter="url(#glow)">
        <animateMotion dur="14s" repeatCount="indefinite" begin="1s">
            <mpath href="#wave2" />
        </animateMotion>
    </circle>

    <circle r="1.5" fill="#a855f7" filter="url(#glow)">
        <animateMotion dur="12s" repeatCount="indefinite" begin="5s">
            <mpath href="#wave3" />
        </animateMotion>
    </circle>

</svg>