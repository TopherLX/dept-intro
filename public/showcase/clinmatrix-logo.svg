<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 892 1005" role="img">
  <title>ClinMatrix</title>
  <defs>
    <linearGradient id="node-deep" x1="51" y1="213" x2="252" y2="796" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#123a5a"/><stop offset="1" stop-color="#042c47"/>
    </linearGradient>
    <linearGradient id="node-teal" x1="346" y1="49" x2="545" y2="955" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#128b8f"/><stop offset="1" stop-color="#075c64"/>
    </linearGradient>
    <linearGradient id="node-bright" x1="640" y1="213" x2="842" y2="439" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17c7c4"/><stop offset="1" stop-color="#0a9ca1"/>
    </linearGradient>
    <linearGradient id="link" x1="139" y1="201" x2="753" y2="807" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3c969a"/><stop offset="1" stop-color="#0a6d75"/>
    </linearGradient>
    <linearGradient id="matrix" x1="288" y1="347" x2="604" y2="573" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#139399"/><stop offset="1" stop-color="#06646d"/>
    </linearGradient>
    <linearGradient id="matrix-light" x1="378" y1="524" x2="513" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e9f3f6"/><stop offset="1" stop-color="#c9dde5"/>
    </linearGradient>
    <filter id="depth" x="-12%" y="-12%" width="124%" height="124%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#062b42" flood-opacity="0.1"/>
    </filter>
    <symbol id="hex" viewBox="0 0 202 226">
      <path d="M101 0c8.4 0 16.6 2.2 23.8 6.4l54.2 31.3c14.2 8.2 23 23.4 23 39.8v71c0 16.4-8.8 31.6-23 39.8l-54.2 31.3c-14.7 8.5-32.9 8.5-47.6 0L23 188.3C8.8 180.1 0 164.9 0 148.5v-71c0-16.4 8.8-31.6 23-39.8L77.2 6.4C84.4 2.2 92.6 0 101 0Z"/>
    </symbol>
  </defs>
  <!-- Links -->
  <g fill="url(#link)" filter="url(#depth)">
    <rect x="250.5" y="220.5" width="90" height="24" rx="12" transform="rotate(-30 295.5 232.5)"/>
    <rect x="551.5" y="220.5" width="90" height="24" rx="12" transform="rotate(30 596.5 232.5)"/>
    <rect x="139" y="447" width="24" height="116" rx="12"/>
    <rect x="731" y="446" width="23" height="117" rx="11.5"/>
    <rect x="250" y="763.5" width="90" height="24" rx="12" transform="rotate(30 295 775.5)"/>
    <rect x="551.5" y="763.5" width="90" height="24" rx="12" transform="rotate(-30 596.5 775.5)"/>
  </g>
  <!-- Nodes -->
  <g filter="url(#depth)">
    <use href="#hex" x="346" y="49" width="200" height="223" fill="url(#node-teal)"/>
    <use href="#hex" x="640" y="213" width="202" height="226" fill="url(#node-bright)"/>
    <use href="#hex" x="639" y="570" width="203" height="227" fill="url(#node-deep)"/>
    <use href="#hex" x="346" y="733" width="200" height="222" fill="url(#node-teal)"/>
    <use href="#hex" x="51" y="569" width="202" height="228" fill="url(#node-deep)"/>
    <use href="#hex" x="51" y="213" width="202" height="226" fill="url(#node-deep)"/>
  </g>
  <!-- Central matrix -->
  <g filter="url(#depth)">
    <rect x="397.5" y="367" width="97" height="97" rx="15" fill="url(#matrix)" transform="rotate(45 446 415.5)"/>
    <rect x="307.5" y="455" width="98" height="98" rx="15" fill="url(#matrix)" transform="rotate(45 356.5 504)"/>
    <rect x="486.5" y="455" width="98" height="98" rx="15" fill="url(#matrix)" transform="rotate(45 535.5 504)"/>
    <rect x="397.25" y="543.75" width="96.5" height="96.5" rx="15" fill="url(#matrix-light)" transform="rotate(45 445.5 592)"/>
  </g>
</svg>
