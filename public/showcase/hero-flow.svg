<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="sun" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="60%" stop-color="#F59E0B"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </radialGradient>
    <linearGradient id="o1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="o2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#60A5FA"/>
    </linearGradient>
    <linearGradient id="o3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="tail" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#F472B6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#F8FAFC" rx="24"/>

  <!-- Stars / dust -->
  <g opacity="0.15">
    <circle cx="60" cy="50" r="1" fill="#64748B"/>
    <circle cx="320" cy="80" r="1.2" fill="#64748B"/>
    <circle cx="350" cy="300" r="0.8" fill="#64748B"/>
    <circle cx="40" cy="280" r="1" fill="#64748B"/>
    <circle cx="120" cy="30" r="0.7" fill="#64748B"/>
    <circle cx="280" cy="360" r="1.1" fill="#64748B"/>
    <circle cx="80" cy="340" r="0.9" fill="#64748B"/>
    <circle cx="330" cy="150" r="0.8" fill="#64748B"/>
  </g>

  <!-- Orbit rings -->
  <g fill="none" stroke-width="1" opacity="0.25">
    <ellipse cx="200" cy="200" rx="140" ry="40" stroke="#8B5CF6" stroke-dasharray="3 5" transform="rotate(-15 200 200)"/>
    <ellipse cx="200" cy="200" rx="100" ry="30" stroke="#3B82F6" stroke-dasharray="2 4" transform="rotate(25 200 200)"/>
    <ellipse cx="200" cy="200" rx="70" ry="22" stroke="#06B6D4" transform="rotate(-40 200 200)"/>
  </g>

  <!-- Center star -->
  <g filter="url(#softGlow)">
    <circle cx="200" cy="200" r="20" fill="#FBBF24" opacity="0.3"/>
  </g>
  <circle cx="200" cy="200" r="14" fill="url(#sun)" filter="url(#glow)">
    <animate attributeName="r" dur="3s" values="14;15;14" repeatCount="indefinite"/>
  </circle>
  <circle cx="200" cy="200" r="5" fill="#FEF3C7" opacity="0.6"/>

  <!-- Planet 1 (violet, inner orbit) -->
  <g>
    <circle cx="200" cy="200" r="42" fill="none" stroke="#CBD5E1" stroke-width="0.5" transform="rotate(-40 200 200)"/>
    <animateMotion dur="6s" repeatCount="indefinite" rotate="auto">
      <mpath><ellipse cx="200" cy="200" rx="70" ry="22" transform="rotate(-40 200 200)"/></mpath>
    </animateMotion>
    <circle r="6" fill="url(#o1)" filter="url(#glow)"/>
    <circle r="2" fill="#C4B5FD" opacity="0.8" cy="-1" cx="1"/>
  </g>

  <!-- Planet 2 (blue, middle orbit) -->
  <g>
    <animateMotion dur="10s" repeatCount="indefinite" rotate="auto">
      <mpath><ellipse cx="200" cy="200" rx="100" ry="30" transform="rotate(25 200 200)"/></mpath>
    </animateMotion>
    <circle r="8" fill="url(#o2)" filter="url(#glow)"/>
    <!-- Ring -->
    <ellipse rx="12" ry="2.5" fill="none" stroke="#60A5FA" stroke-width="1" transform="rotate(-20)" opacity="0.6"/>
  </g>

  <!-- Planet 3 (pink, outer orbit) -->
  <g>
    <animateMotion dur="15s" repeatCount="indefinite" rotate="auto">
      <mpath><ellipse cx="200" cy="200" rx="140" ry="40" transform="rotate(-15 200 200)"/></mpath>
    </animateMotion>
    <circle r="5" fill="#F472B6" filter="url(#glow)"/>
    <!-- Trail -->
    <ellipse rx="14" ry="3" fill="url(#tail)" opacity="0.4" transform="rotate(180)"/>
  </g>

  <!-- Small moon -->
  <g>
    <animateMotion dur="3s" repeatCount="indefinite" rotate="auto">
      <mpath><ellipse cx="200" cy="200" rx="12" ry="12"/></mpath>
    </animateMotion>
    <circle r="2" fill="#22D3EE" filter="url(#glow)"/>
  </g>
</svg>
